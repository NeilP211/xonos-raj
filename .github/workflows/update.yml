name: update

# Refreshes the Spotify data and deploys the site to GitHub Pages.
# Runs on a schedule, on pushes to main, and on manual dispatch.
on:
  schedule:
    - cron: '0 */3 * * *' # about every 3 hours
  push:
    branches: [main]
  workflow_dispatch:

# One run at a time; queue rather than cancel so scheduled refreshes are not lost.
concurrency:
  group: xonos-raj-update
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the data push can rebase before pushing
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      # Pull fresh data. continue-on-error so the site still deploys with sample
      # data before the Spotify secrets are configured.
      - name: Refresh Spotify data
        id: refresh
        continue-on-error: true
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
        run: node scripts/fetch.mjs

      # Surface a swallowed refresh failure (e.g. an expired token) instead of
      # silently redeploying stale or sample data with a green check.
      - name: Warn if refresh failed
        if: steps.refresh.outcome == 'failure'
        run: echo "::warning title=Spotify refresh failed::scripts/fetch.mjs did not succeed; deploying with the previous data. Check the secrets and refresh token."

      # Persist refreshed data so the recently-played log accumulates over time.
      # Rebase before pushing and retry so a concurrent push does not silently
      # drop accumulated history; a genuine failure fails the step loudly.
      - name: Commit refreshed data
        run: |
          git config user.name "xonos-bot"
          git config user.email "actions@users.noreply.github.com"
          git add public/data
          if git diff --cached --quiet; then
            echo "no data changes"
          else
            git commit -m "data: scheduled refresh"
            for attempt in 1 2 3; do
              if git pull --rebase origin main && git push; then
                echo "pushed on attempt $attempt"
                exit 0
              fi
              echo "push attempt $attempt failed; retrying"
              sleep 5
            done
            echo "::error title=Data push failed::Could not push refreshed data after 3 attempts."
            exit 1
          fi

      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
